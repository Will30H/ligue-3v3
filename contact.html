<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact – Ligue 3 vs 3</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin:0;
        padding:0;
        background:#e9eef5;
    }

    header {
        background:#0b1e3d;
        border-bottom:10px solid #c62828;
        padding:25px 0;
        text-align:center;
        color:white;
        font-size:34px;
        font-weight:bold;
        letter-spacing:2px;
        text-transform:uppercase;
        box-shadow:0 4px 15px rgba(0,0,0,0.4);
    }

    nav {
        background:#12315c;
        padding:12px 0;
        box-shadow:0 3px 10px rgba(0,0,0,0.3);
    }
    nav ul {
        list-style:none;
        display:flex;
        justify-content:center;
        gap:35px;
        margin:0;
        padding:0;
    }
    nav a {
        color:white;
        text-decoration:none;
        font-size:18px;
        font-weight:bold;
        transition:0.2s;
    }
    nav a:hover {
        color:#c62828;
    }

    .card {
        background:white;
        max-width:700px;
        margin:40px auto;
        padding:30px;
        border-radius:15px;
        box-shadow:0 4px 15px rgba(0,0,0,0.25);
        border-left:8px solid #c62828;
        border-right:8px solid #0b1e3d;
    }

    h1 {
        text-align:center;
        color:#0b1e3d;
        margin-bottom:20px;
        font-size:32px;
        text-shadow:0 2px 5px rgba(0,0,0,0.2);
    }

    label {
        font-size:17px;
        font-weight:bold;
        color:#0b1e3d;
    }

    input, textarea {
        width:100%;
        padding:12px;
        margin-top:8px;
        margin-bottom:20px;
        border-radius:8px;
        border:2px solid #c62828;
        background:#f4f8ff;
        font-size:16px;
    }

    textarea {
        height:120px;
        resize:none;
    }

    button {
        width:100%;
        padding:12px;
        background:#0b1e3d;
        color:white;
        border:none;
        border-radius:8px;
        font-size:18px;
        font-weight:bold;
        border:3px solid #c62828;
        cursor:pointer;
        transition:0.2s;
    }

    button:hover {
        background:#12315c;
        transform:scale(1.05);
    }

    .info {
        margin-top:25px;
        padding:15px;
        background:#f4f8ff;
        border-radius:10px;
        border:3px solid #c62828;
    }

    .info p {
        margin:5px 0;
        font-size:17px;
        color:#333;
    }@media (max-width: 600px) {
    nav ul {
        flex-direction: column;
        gap: 15px;
    }

    nav a {
        font-size: 20px;
        padding: 10px 0;
    }

    header {
        font-size: 26px;
        padding: 18px 0;
    }

    .grid {
        grid-template-columns: 1fr;
        gap: 20px;
    }

    .team-card img {
        width: 120px;
        height: 120px;
    }

    .card {
        margin: 20px;
        padding: 20px;
    }

    table th, table td {
        padding: 10px;
        font-size: 15px;
    }
}

</style>
</head>

<body>

<header>📞 Contact – Ligue 3 vs 3</header>

    <li><a href="Horaire.html">Horaire</a></li>
    <li><a href="classement.html">Classement</a></li>
    <li><a href="resultat.html">Résultats</a></li>
    <li><a href="reglements.html">Règlements</a></li>
    <li><a href="series.html">Séries</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<div class="card">

<h1>Nous contacter</h1>

<form>
    <label>Nom</label>
    <input type="text" placeholder="Votre nom">

    <label>Courriel</label>
    <input type="email" placeholder="Votre adresse courriel">

    <label>Message</label>
    <textarea placeholder="Votre message"></textarea>

    <button type="submit">Envoyer</button>
</form>

</html>
