<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin – Entrer les scores</title>

<style>
body {
    font-family: Arial;
    background:#e9eef5;
    padding:20px;
}

.card {
    background:white;
    padding:20px;
    border-radius:10px;
    max-width:400px;
    margin:auto;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

select, input {
    width:100%;
    padding:10px;
    margin:10px 0;
    font-size:16px;
}

button {
    width:100%;
    padding:12px;
    background:#0b1e3d;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
    <h2>Entrer un score</h2>

    <label>Match :</label>
    <select id="matchSelect"></select>

    <label>Score équipe A :</label>
    <input type="number" id="scoreA">

    <label>Score équipe B :</label>
    <input type="number" id="scoreB">

    <button onclick="saveScore()">Enregistrer</button>
</div>

<script src="matchs.js"></script>

<script>
// Charger la liste des matchs
const select = document.getElementById("matchSelect");

matchs.forEach((m, index) => {
    const opt = document.createElement("option");
    opt.value = index;
    opt.textContent = `Semaine ${m.semaine} – Équipe ${m.equipeA} vs Équipe ${m.equipeB}`;
    select.appendChild(opt);
});

// Sauvegarder le score
function saveScore() {
    const index = select.value;
    const scoreA = document.getElementById("scoreA").value;
    const scoreB = document.getElementById("scoreB").value;

    matchs[index].scoreA = Number(scoreA);
    matchs[index].scoreB = Number(scoreB);

    localStorage.setItem("matchs", JSON.stringify(matchs));

    alert("Score enregistré !");
}
</script>

</body>
</html>
