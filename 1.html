<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Équipe 1</title>

<style>
    body { font-family: Arial; background:#eef2f7; margin:0; padding:0; }

    /* MENU */
    nav {
        background:#1a3d7c;
        padding:15px 0;
        box-shadow:0 3px 10px rgba(0,0,0,0.15);
        margin-bottom:25px;
    }
    nav ul {
        list-style:none;
        display:flex;
        justify-content:center;
        gap:40px;
        margin:0;
        padding:0;
    }
    nav a {
        color:white;
        text-decoration:none;
        font-size:18px;
        font-weight:bold;
    }

    /* CARD */
    .card {
        background:white;
        max-width:800px;
        margin:auto;
        padding:25px;
        border-radius:15px;
        box-shadow:0 4px 15px rgba(0,0,0,0.1);
        text-align:center;
    }

    img {
        width:150px;
        height:150px;
        object-fit:contain;
        margin-bottom:20px;
    }

    /* TABLEAU JOUEURS */
    table {
        width:100%;
        border-collapse:collapse;
        margin-top:20px;
        border-radius:10px;
        overflow:hidden;
    }

    th {
        background:#1a3d7c;
        color:white;
        padding:12px;
        font-size:16px;
    }

    td {
        padding:12px;
        background:#f9fbfd;
        border-bottom:1px solid #dce3ec;
        text-align:center;
    }

    tr:nth-child(even) td {
        background:#eef3f9;
    }

    /* BOUTON */
    .btn {
        display:inline-block;
        margin-top:25px;
        padding:12px 25px;
        background:#1a3d7c;
        color:white;
        text-decoration:none;
        border-radius:8px;
        font-size:18px;
        font-weight:bold;
        transition:0.2s;
    }
    .btn:hover { background:#163568; }
</style>
</head>
